<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<meta name="apple-mobile-web-app-title" content="LeanOS"/>
<title>LeanOS — Weight Loss</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:#060D1A;
    --card:#0D1E35;
    --card2:#122540;
    --text:#E8F4FF;
    --sub:#6B9EC4;
    --sep:#1A3A5C;
    --green:#00E5A0;
    --blue:#2E9EFF;
    --orange:#FF9F0A;
    --pink:#FF4D8D;
    --purple:#A78BFA;
    --teal:#00D4FF;
    --nav-h: 72px;
  }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; background:var(--bg); font-family:'DM Sans',-apple-system,sans-serif; overflow:hidden; }

  #app { width:100%; height:100dvh; background:var(--bg); display:flex; flex-direction:column; }

  .screen-content {
    flex:1; overflow-y:auto; overflow-x:hidden; scrollbar-width:none;
  }
  .screen-content::-webkit-scrollbar { display:none; }
  .screen { opacity:1; transform:translateX(0); transition:opacity 0.22s, transform 0.22s; padding-bottom:12px; }
  .screen.animating { opacity:0; transform:translateX(14px); }

  /* ── BIGGER BOTTOM NAV ── */
  .bottom-nav {
    flex-shrink:0;
    background:rgba(6,13,26,0.97);
    backdrop-filter:blur(24px);
    border-top:0.5px solid var(--sep);
    display:flex;
    padding-bottom:env(safe-area-inset-bottom,12px);
    height:calc(var(--nav-h) + env(safe-area-inset-bottom,12px));
  }
  .nav-btn {
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:4px; border:none; background:none; color:var(--sub);
    font-family:inherit; cursor:pointer; transition:color 0.18s;
    min-height:var(--nav-h); padding:6px 2px;
    -webkit-tap-highlight-color:transparent;
  }
  .nav-btn.active { color:var(--blue); }
  .nav-btn span.icon { font-size:24px; line-height:1; }
  .nav-btn span.label { font-size:10px; font-weight:500; letter-spacing:0.2px; }
  .nav-btn.active span.label { font-weight:700; }

  /* ── CARDS ── */
  .card { background:var(--card); border-radius:16px; padding:16px; margin:0 16px 12px; }
  .card2 { background:var(--card2); border-radius:12px; padding:14px; margin-bottom:10px; }
  .header {
    padding:calc(env(safe-area-inset-top,16px) + 16px) 20px 8px;
    display:flex; justify-content:space-between; align-items:flex-end;
  }
  .big-title { font-size:28px; font-weight:700; letter-spacing:-1px; }
  .label-caps { font-size:13px; color:var(--sub); font-weight:500; margin-bottom:4px; text-transform:uppercase; letter-spacing:0.5px; }
  .row { display:flex; align-items:center; gap:12px; }
  .sep-line { height:1px; background:var(--sep); margin:14px 0; }
  .pill { border-radius:20px; padding:4px 10px; font-size:12px; font-weight:600; }
  .sub-text { color:var(--sub); }

  /* ── RING ── */
  .ring-wrap { position:relative; flex-shrink:0; }
  .ring-wrap svg { display:block; }
  .ring-inner { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; }
  circle.fill { transition:stroke-dasharray 0.8s ease; }

  /* ── PROGRESS BAR ── */
  .prog-bar { height:8px; border-radius:4px; transition:background 0.6s ease; }

  /* ── IOS TOGGLE ── */
  .ios-toggle { width:51px; height:31px; border-radius:15.5px; position:relative; cursor:pointer; flex-shrink:0; transition:background 0.25s; }
  .ios-toggle.on { background:var(--green); }
  .ios-toggle.off { background:#3A3A3C; }
  .ios-knob { position:absolute; width:27px; height:27px; background:#fff; border-radius:50%; top:2px; transition:left 0.25s; box-shadow:0 2px 6px rgba(0,0,0,0.4); }
  .ios-toggle.on .ios-knob { left:22px; }
  .ios-toggle.off .ios-knob { left:2px; }

  /* ── INPUTS / BUTTONS ── */
  input[type=number],input[type=time],input[type=text] {
    background:var(--card2); border:1.5px solid var(--sep); border-radius:10px;
    color:var(--text); font-size:16px; padding:13px 14px;
    outline:none; font-family:inherit; width:100%;
    transition:border-color 0.2s;
  }
  input:focus { border-color:var(--teal); box-shadow: 0 0 0 3px rgba(0,212,255,0.12); }
  input[type=time] { font-size:22px; font-weight:700; }
  .btn {
    border:none; border-radius:14px; padding:15px 0; width:100%;
    font-size:16px; font-weight:700; cursor:pointer; font-family:inherit;
    letter-spacing:-0.3px; color:#fff; transition:opacity 0.15s, transform 0.1s;
  }
  .btn:active { opacity:0.85; transform:scale(0.98); }
  .btn-blue { background:linear-gradient(135deg,#2E9EFF,#0A6EE8); }
  .btn-green { background:linear-gradient(135deg,#00E5A0,#00B87A); color:#03100A; }
  .btn-purple { background:linear-gradient(135deg,#A78BFA,#7C3AED); }
  .btn-orange { background:linear-gradient(135deg,#FF9F0A,#E07800); color:#1A0A00; }
  .btn-inline { width:auto; padding:13px 20px; }
  .btn-ghost {
    background:var(--card2); border:1.5px solid var(--sep); color:var(--text);
    border-radius:14px; padding:13px 0; width:100%;
    font-size:15px; font-weight:600; cursor:pointer; font-family:inherit;
  }

  /* ── CHECKBOX ── */
  .check-circle {
    width:26px; height:26px; border-radius:50%; border:2px solid var(--sub);
    background:transparent; cursor:pointer; display:flex; align-items:center;
    justify-content:center; flex-shrink:0; transition:all 0.2s;
  }
  .check-circle.done { border-color:var(--green); background:var(--green); }
  .check-circle.done::after { content:'✓'; font-size:13px; color:#03100A; font-weight:800; }

  /* ── LIST ITEMS ── */
  .item-sep { border-bottom:1px solid var(--sep); }
  .list-item { padding:12px 0; }
  .list-item:last-child { border-bottom:none !important; }
  .two-col { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:0 16px 12px; }
  .mini-card { background:var(--card); border-radius:16px; padding:14px; }

  /* ── CHART ── */
  .chart-labels { display:flex; justify-content:space-between; margin-top:8px; }
  .chart-labels span { font-size:9px; color:var(--sub); }

  /* ── SYNC PANEL ── */
  .sync-status {
    display:flex; align-items:center; gap:8px;
    padding:10px 14px; border-radius:12px; margin-bottom:12px;
    font-size:13px; font-weight:600;
  }
  .sync-status.idle { background:var(--card2); color:var(--sub); border:1px solid var(--sep); }
  .sync-status.synced { background:rgba(0,229,160,0.12); color:var(--green); border:1px solid rgba(0,229,160,0.25); }
  .sync-status.error { background:rgba(255,77,141,0.12); color:var(--pink); border:1px solid rgba(255,77,141,0.25); }
  .sync-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .sync-status.idle .sync-dot { background:var(--sub); }
  .sync-status.synced .sync-dot { background:var(--green); animation:pulse-dot 2s infinite; }
  .sync-status.error .sync-dot { background:var(--pink); }
  @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ── TOAST ── */
  .toast {
    position:fixed; bottom:calc(var(--nav-h) + env(safe-area-inset-bottom,12px) + 14px);
    left:50%; transform:translateX(-50%) translateY(50px);
    background:var(--blue); color:#fff; padding:10px 22px; border-radius:99px;
    font-size:13px; font-weight:600; opacity:0; z-index:999; pointer-events:none;
    transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1); white-space:nowrap;
    box-shadow:0 4px 24px rgba(46,158,255,0.4);
  }
  .toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
  .toast.green { background:var(--green); color:#03100A; box-shadow:0 4px 24px rgba(0,229,160,0.4); }

  /* ── SETUP MODAL ── */
  .modal-overlay {
    display:none; position:fixed; inset:0; background:rgba(3,8,18,0.85);
    z-index:500; align-items:flex-end; justify-content:center;
    backdrop-filter:blur(8px);
  }
  .modal-overlay.open { display:flex; }
  .modal-sheet {
    background:var(--card); border-radius:24px 24px 0 0; width:100%;
    max-width:480px; padding:24px 20px calc(env(safe-area-inset-bottom,16px)+24px);
    animation:slide-up 0.3s cubic-bezier(0.34,1.56,0.64,1);
    border-top:1px solid var(--sep);
  }
  @keyframes slide-up { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .modal-handle { width:36px; height:4px; background:var(--sep); border-radius:2px; margin:0 auto 20px; }
  .modal-title { font-size:20px; font-weight:700; margin-bottom:18px; letter-spacing:-0.5px; }
  .form-row { margin-bottom:14px; }
  .form-row label { font-size:12px; color:var(--sub); text-transform:uppercase; letter-spacing:0.5px; display:block; margin-bottom:6px; font-weight:600; }
  .input-unit-wrap { position:relative; }
  .input-unit-wrap input { padding-right:48px; }
  .input-unit { position:absolute; right:14px; top:50%; transform:translateY(-50%); font-size:14px; color:var(--sub); font-weight:600; pointer-events:none; }
  .three-col { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }
</style>
</head>
<body>
<div id="app">
  <div class="screen-content" id="screen-content">
    <div class="screen" id="screen"></div>
  </div>
  <nav class="bottom-nav" id="bottom-nav"></nav>
</div>

<!-- Setup / Edit Goals Modal -->
<div class="modal-overlay" id="setup-modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">⚙️ Weight & Goals Setup</div>

    <div class="form-row">
      <label>Starting Weight</label>
      <div class="input-unit-wrap">
        <input type="number" id="setup-start" step="0.1" placeholder="e.g. 210"/>
        <span class="input-unit">lbs</span>
      </div>
    </div>
    <div class="form-row">
      <label>Current Weight</label>
      <div class="input-unit-wrap">
        <input type="number" id="setup-current" step="0.1" placeholder="e.g. 203"/>
        <span class="input-unit">lbs</span>
      </div>
    </div>
    <div class="form-row">
      <label>Goal Weight</label>
      <div class="input-unit-wrap">
        <input type="number" id="setup-goal" step="0.1" placeholder="e.g. 175"/>
        <span class="input-unit">lbs</span>
      </div>
    </div>
    <div class="form-row">
      <label>Daily Calorie Target</label>
      <div class="input-unit-wrap">
        <input type="number" id="setup-cals" step="10" placeholder="e.g. 1800"/>
        <span class="input-unit">kcal</span>
      </div>
    </div>
    <div class="form-row">
      <label>Daily Step Target</label>
      <div class="input-unit-wrap">
        <input type="number" id="setup-steps" step="500" placeholder="e.g. 8000"/>
        <span class="input-unit">steps</span>
      </div>
    </div>
    <div class="form-row">
      <label>Daily Exercise Target</label>
      <div class="input-unit-wrap">
        <input type="number" id="setup-exercise" step="5" placeholder="e.g. 30"/>
        <span class="input-unit">min</span>
      </div>
    </div>
    <div style="display:flex;gap:10px;margin-top:6px">
      <button class="btn-ghost" style="flex:1;border-radius:14px;font-size:15px;padding:14px 0" onclick="closeSetup()">Cancel</button>
      <button class="btn btn-blue" style="flex:2" onclick="saveSetup()">Save Goals</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─────────────────────────────────────────────────────────
// STATE — persisted to localStorage
// ─────────────────────────────────────────────────────────
const STORAGE_KEY = 'leanos_v1';

function defaultState(){
  return {
    startWeight:210, currentWeight:203.0, goalWeight:175,
    weightLog:[
      {date:'May 1',weight:210},{date:'May 5',weight:208.4},
      {date:'May 10',weight:207.1},{date:'May 15',weight:205.8},
      {date:'May 20',weight:204.2},{date:'May 23',weight:203.0},
    ],
    calories:{goal:1800, consumed:1240, burned:320},
    sleep:{bedtime:'22:30',wakeTime:'06:30'},
    meals:[
      {id:1,name:'Greek Yogurt + Berries',cal:180,time:'7:30 AM',done:true},
      {id:2,name:'Grilled Chicken Salad',cal:420,time:'12:30 PM',done:true},
      {id:3,name:'Apple + Almond Butter',cal:210,time:'3:30 PM',done:false},
      {id:4,name:'Salmon + Veggies',cal:480,time:'7:00 PM',done:false},
    ],
    reminders:[
      {id:1,label:'Morning Weigh-In',time:'07:00',active:true,icon:'⚖️'},
      {id:2,label:'Drink 16oz Water',time:'08:00',active:true,icon:'💧'},
      {id:3,label:'10-min Walk',time:'10:00',active:true,icon:'🚶'},
      {id:4,label:'Log Lunch',time:'12:30',active:true,icon:'🥗'},
      {id:5,label:'Afternoon Stretch',time:'15:00',active:false,icon:'🧘'},
      {id:6,label:'Evening Walk',time:'18:00',active:true,icon:'🌅'},
      {id:7,label:'No Food After 8PM',time:'20:00',active:true,icon:'🚫'},
      {id:8,label:'Bedtime Wind Down',time:'22:00',active:true,icon:'🌙'},
    ],
    goals:{
      dailySteps:{target:8000,current:5430},
      waterOz:{target:64,current:40},
      exerciseMin:{target:30,current:18},
      calDeficit:{target:500,current:358},
    },
    fuelSyncEnabled: false,
    fuelLastSynced: null,
    fuelCalories: null,
  };
}

function loadState(){
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) return Object.assign(defaultState(), JSON.parse(raw));
  } catch(e){}
  return defaultState();
}
function saveState(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

let state = loadState();
let currentScreen = 'dashboard';

// ─────────────────────────────────────────────────────────
// FUEL SYNC — reads FUEL's localStorage keys
// FUEL stores day data under keys like "fuel_log_YYYY-MM-DD"
// or aggregates. We detect what's available and pull calories.
// ─────────────────────────────────────────────────────────
function getTodayKey(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function pullFromFuel(){
  const todayKey = getTodayKey();
  let found = false;
  let totalCals = 0;

  // Strategy 1: FUEL stores per-day logs as JSON arrays
  // Keys it uses: "fuel_log_YYYY-MM-DD", "fuel-log-YYYY-MM-DD", or just "fuelData"
  const keysToTry = [
    `fuel_log_${todayKey}`,
    `fuel-log-${todayKey}`,
    `fuel_${todayKey}`,
    `log_${todayKey}`,
  ];

  for(const key of keysToTry){
    const raw = localStorage.getItem(key);
    if(raw){
      try{
        const data = JSON.parse(raw);
        if(Array.isArray(data)){
          totalCals = data.reduce((s,item)=>s+(item.calories||item.cal||item.kcal||0),0);
          found = true; break;
        } else if(data && typeof data.calories==='number'){
          totalCals = data.calories; found = true; break;
        }
      } catch(e){}
    }
  }

  // Strategy 2: scan all localStorage for today's date pattern
  if(!found){
    for(let i=0;i<localStorage.length;i++){
      const key = localStorage.key(i);
      if(!key) continue;
      if(key.includes(todayKey) || key.includes('fuel') || key.includes('FUEL')){
        try{
          const raw = localStorage.getItem(key);
          const data = JSON.parse(raw);
          // Array of food items
          if(Array.isArray(data) && data.length > 0 && (data[0].calories!==undefined||data[0].cal!==undefined)){
            totalCals = data.reduce((s,it)=>s+(it.calories||it.cal||it.kcal||0),0);
            found = true; break;
          }
          // Object with a "foods" or "items" array
          if(data && (data.foods||data.items||data.entries)){
            const arr = data.foods||data.items||data.entries;
            if(Array.isArray(arr)){
              totalCals = arr.reduce((s,it)=>s+(it.calories||it.cal||it.kcal||0),0);
              found = true; break;
            }
          }
          // Object with top-level total
          if(data && typeof data.total_calories==='number'){ totalCals=data.total_calories; found=true; break; }
          if(data && typeof data.totalCalories==='number'){ totalCals=data.totalCalories; found=true; break; }
        } catch(e){}
      }
    }
  }

  // Strategy 3: Look for the exact FUEL app pattern from the repo code
  // FUEL uses "fuelData" or similar as its top-level store
  if(!found){
    const candidates = ['fuelData','fuel_data','fuel-data','healthData','health_data'];
    for(const key of candidates){
      const raw = localStorage.getItem(key);
      if(!raw) continue;
      try{
        const data = JSON.parse(raw);
        const dayData = data[todayKey]||data.today||data[Object.keys(data).sort().pop()];
        if(dayData){
          if(typeof dayData.calories==='number'){ totalCals=dayData.calories; found=true; break; }
          if(Array.isArray(dayData)){
            totalCals=dayData.reduce((s,it)=>s+(it.calories||it.cal||0),0);
            found=true; break;
          }
        }
      } catch(e){}
    }
  }

  return found ? Math.round(totalCals) : null;
}

function syncWithFuel(){
  const cals = pullFromFuel();
  if(cals !== null){
    state.calories.consumed = cals;
    state.fuelCalories = cals;
    state.fuelLastSynced = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    saveState();
    showToast('✓ Synced '+cals+' cal from FUEL', 'green');
    navigate(currentScreen);
    return true;
  } else {
    showToast('No FUEL data found for today', '');
    return false;
  }
}

function pushToFuel(cals){
  // Write a standard key both apps agree on
  const todayKey = getTodayKey();
  const payload = {
    date: todayKey,
    calories: cals,
    source: 'LeanOS',
    timestamp: Date.now(),
  };
  localStorage.setItem(`fuel_log_${todayKey}`, JSON.stringify(payload));
  // Also write a "latest" key for convenience
  localStorage.setItem('leanos_today_calories', JSON.stringify(payload));
  showToast('↑ Pushed '+cals+' cal to FUEL', 'green');
}

// Auto-sync on load if enabled
if(state.fuelSyncEnabled){
  setTimeout(()=>pullFromFuel(),500);
}

// ─────────────────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────────────────
const C = {green:'#30D158',blue:'#0A84FF',orange:'#FF9F0A',pink:'#FF375F',purple:'#BF5AF2',teal:'#5AC8FA',sub:'#8E8E93'};
function pct(a,b){ return Math.min(a/b,1); }
function lostSoFar(){ return +(state.startWeight - state.currentWeight).toFixed(1); }
function toGo(){ return +(state.currentWeight - state.goalWeight).toFixed(1); }
function overallProgress(){ const t=state.startWeight-state.goalWeight; return t<=0?0:Math.min(lostSoFar()/t,1); }
function netCals(){ return state.calories.consumed - state.calories.burned; }
function remaining(){ return state.calories.goal - netCals(); }
function eatenCals(){ return state.meals.filter(m=>m.done).reduce((s,m)=>s+m.cal,0); }

function showToast(msg, type=''){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (type?' '+type:'');
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(()=>t.classList.remove('show'), 2400);
}

// ─────────────────────────────────────────────────────────
// SVG HELPERS
// ─────────────────────────────────────────────────────────
function ring(size,stroke,progress,color,innerHTML=''){
  const r=(size-stroke)/2, circ=2*Math.PI*r, dash=circ*Math.min(progress,1);
  return `<div class="ring-wrap" style="width:${size}px;height:${size}px">
    <svg width="${size}" height="${size}" style="transform:rotate(-90deg)">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="${stroke}"/>
      <circle class="fill" cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}"
        stroke-dasharray="${dash} ${circ}" stroke-linecap="round"/>
    </svg>
    <div class="ring-inner">${innerHTML}</div>
  </div>`;
}
function progressBar(p,color){
  const f=Math.min(p,1)*100;
  return `<div class="prog-bar" style="background:linear-gradient(90deg,${color} ${f}%,#3A3A3C ${f}%)"></div>`;
}
function pill(text,color){
  return `<span class="pill" style="background:${color}22;color:${color}">${text}</span>`;
}
function weightChart(){
  const log=state.weightLog, w=280, h=120;
  const vals=log.map(d=>d.weight);
  const mn=Math.min(...vals)-1, mx=Math.max(...vals)+1;
  const pts=log.map((d,i)=>({ x:(i/(log.length-1))*(w-20)+10, y:h-((d.weight-mn)/(mx-mn))*(h-20)-10 }));
  const pathD=pts.reduce((a,p,i)=>i===0?`M${p.x},${p.y}`:`${a} L${p.x},${p.y}`,'');
  const areaD=`${pathD} L${w-10},${h} L10,${h} Z`;
  return `<svg width="${w}" height="${h}" style="overflow:visible">
    <defs><linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${C.green}" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="${C.green}" stop-opacity="0"/>
    </linearGradient></defs>
    <path d="${areaD}" fill="url(#cg)"/>
    <path d="${pathD}" fill="none" stroke="${C.green}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

function openSetup(){
  document.getElementById('setup-start').value = state.startWeight;
  document.getElementById('setup-current').value = state.currentWeight;
  document.getElementById('setup-goal').value = state.goalWeight;
  document.getElementById('setup-cals').value = state.calories.goal;
  document.getElementById('setup-steps').value = state.goals.dailySteps.target;
  document.getElementById('setup-exercise').value = state.goals.exerciseMin.target;
  document.getElementById('setup-modal').classList.add('open');
}
function closeSetup(){
  document.getElementById('setup-modal').classList.remove('open');
}
function saveSetup(){
  const sw=parseFloat(document.getElementById('setup-start').value);
  const cw=parseFloat(document.getElementById('setup-current').value);
  const gw=parseFloat(document.getElementById('setup-goal').value);
  const cal=parseInt(document.getElementById('setup-cals').value);
  const steps=parseInt(document.getElementById('setup-steps').value);
  const ex=parseInt(document.getElementById('setup-exercise').value);
  if([sw,cw,gw,cal,steps,ex].some(v=>isNaN(v)||v<=0)){ showToast('Please fill all fields'); return; }
  state.startWeight=sw; state.currentWeight=cw; state.goalWeight=gw;
  state.calories.goal=cal;
  state.goals.dailySteps.target=steps;
  state.goals.exerciseMin.target=ex;
  if(!state.weightLog.find(e=>e.weight===cw)){
    const today=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'});
    state.weightLog=[...state.weightLog.slice(-9),{date:today,weight:cw}];
  }
  saveState();
  closeSetup();
  showToast('✓ Goals saved!','green');
  navigate(currentScreen);
}
document.getElementById('setup-modal').addEventListener('click',e=>{
  if(e.target===document.getElementById('setup-modal')) closeSetup();
});

  {id:'dashboard',icon:'🏠',label:'Home'},
  {id:'weight',icon:'⚖️',label:'Weight'},
  {id:'calories',icon:'🔥',label:'Calories'},
  {id:'sleep',icon:'🌙',label:'Sleep'},
  {id:'food',icon:'🥗',label:'Food'},
  {id:'reminders',icon:'🔔',label:'Alerts'},
  {id:'goals',icon:'🎯',label:'Goals'},
];
function renderNav(){
  document.getElementById('bottom-nav').innerHTML=tabs.map(t=>`
    <button class="nav-btn ${currentScreen===t.id?'active':''}" onclick="navigate('${t.id}')">
      <span class="icon">${t.icon}</span><span class="label">${t.label}</span>
    </button>`).join('');
}
function navigate(id){
  currentScreen=id;
  const el=document.getElementById('screen');
  el.classList.add('animating');
  document.getElementById('screen-content').scrollTo(0,0);
  setTimeout(()=>{ el.innerHTML=getScreenHTML(); el.classList.remove('animating'); },200);
  renderNav();
}
function getScreenHTML(){
  const map={dashboard:renderDashboard,weight:renderWeight,calories:renderCalories,sleep:renderSleep,food:renderFood,reminders:renderReminders,goals:renderGoals};
  return (map[currentScreen]||renderDashboard)();
}

// ─────────────────────────────────────────────────────────
// ACTIONS
// ─────────────────────────────────────────────────────────
function logWeight(){
  const inp=document.getElementById('weight-input');
  const w=parseFloat(inp.value);
  if(!w||w<50||w>500){ showToast('Enter a valid weight'); return; }
  const today=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'});
  state.currentWeight=w;
  state.weightLog=[...state.weightLog.slice(-9),{date:today,weight:w}];
  saveState();
  inp.value='';
  showToast('✓ Weight logged!','green');
  navigate('weight');
}
function toggleMeal(id){
  state.meals=state.meals.map(m=>m.id===id?{...m,done:!m.done}:m);
  state.calories.consumed=eatenCals();
  saveState(); navigate('food');
}
function toggleReminder(id){
  state.reminders=state.reminders.map(r=>r.id===id?{...r,active:!r.active}:r);
  saveState(); navigate('reminders');
}
function updateSleep(){
  const b=document.getElementById('bedtime-input');
  const w=document.getElementById('wake-input');
  if(b) state.sleep.bedtime=b.value;
  if(w) state.sleep.wakeTime=w.value;
  document.getElementById('screen').innerHTML=renderSleep();
}
function saveSleep(){
  const b=document.getElementById('bedtime-input');
  const w=document.getElementById('wake-input');
  if(b) state.sleep.bedtime=b.value;
  if(w) state.sleep.wakeTime=w.value;
  saveState();
  showToast('✓ Sleep schedule saved','green');
  navigate('sleep');
}

// ─────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────
document.getElementById('screen').innerHTML=getScreenHTML();
renderNav();
</script>
</body>
</html>
